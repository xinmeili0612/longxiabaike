<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>教程详情</title><link rel="stylesheet" href="style.css"></head><body><div class="wrap"><div class="topnav"><a class="nav" href="index.html">首页</a><a class="nav" href="quiz.html">路线测试</a></div><div class="card dark"><div class="title">如何用小龙虾从 0 到 1 跑通第一个任务</div><div class="sub">给完全没用过 OpenClaw 的人准备的实战入门教程。</div></div><div class="card"><div class="section">先别学太多，先跑通一次</div><div class="sub">很多人一上来就想把所有能力全学会，最后什么都没跑起来。更有效的方法，是先选一个本周就能真实用到的任务。</div></div><div class="card"><div class="section">从最接近结果的场景开始</div><div class="sub">想赚钱就先做内容；想提效就先做整理；想感受自动化就先做浏览器和定时任务。</div></div><div class="card"><div class="section">跑通一次，比看十篇教程更重要</div><div class="sub">真正让人上手的不是概念，而是第一次看到结果。</div></div></div></body></html>
